<body>
  <!--
    Build here.

    PLANTS:
      brazos  - Brazos Wind Farm         lat=32.27   lon=-100.92  type=wind
      mojave  - Mojave Solar Array       lat=35.01   lon=-117.31  type=solar
      permian - Permian Solar Project    lat=31.42   lon=-103.49  type=solar

    API (no key required, CORS-enabled):
      https://api.open-meteo.com/v1/forecast
        ?latitude=LAT
        &longitude=LON
        &hourly=temperature_2m,wind_speed_10m,shortwave_radiation
        &forecast_days=1

    EXAMPLE CALL:
      https://api.open-meteo.com/v1/forecast?latitude=32.27&longitude=-100.92&hourly=temperature_2m,wind_speed_10m,shortwave_radiation&forecast_days=1

    EXAMPLE RESPONSE (abbreviated):
      {
        "hourly": {
          "time":                ["2026-05-26T00:00", ...24 entries],
          "temperature_2m":      [21.3, ...],
          "wind_speed_10m":      [8.4,  ...],
          "shortwave_radiation": [0,    ...]
        }
      }
  -->
